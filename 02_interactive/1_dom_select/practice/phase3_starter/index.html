<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phase 3 - 이벤트 객체</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="app">
      <div class="app-header">
        <h1>나만의 Todo 앱</h1>
        <p>오늘도 하나씩 해봐요 💪</p>
        <div class="summary">
          남은 할 일: <span id="remaining-count">0</span>개
        </div>
      </div>

      <div class="mission-box">
        <strong>🎯 Phase 3 미션</strong>
        ① Enter 키를 눌러도 항목이 추가되도록 하기<br />
        &nbsp;&nbsp;- 힌트: e.key === 'Enter' 를 활용하세요<br />
        ② 체크박스 클릭 시 li에 'done' 클래스 토글하기<br />
        &nbsp;&nbsp;- 힌트: e.target.checked 로 체크 여부 확인<br />
        &nbsp;&nbsp;- 힌트: li.classList.toggle('done') 을 활용하세요<br />
        ③ 완료된 항목은 카운트에서 빼기
      </div>

      <div class="input-area">
        <div class="input-row">
          <input
            type="text"
            id="todo-input"
            placeholder="할 일을 입력하세요 (Enter도 됩니다)"
          />
          <button class="btn-add" id="add-btn">추가</button>
        </div>
      </div>

      <ul class="todo-list" id="todo-list"></ul>
    </div>
  </body>
</html>
